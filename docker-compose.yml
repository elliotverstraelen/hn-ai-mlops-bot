version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: hn-ai-bot
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: "no"

volumes:
  mlflow_data:
